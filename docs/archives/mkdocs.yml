---
# Project info
site_name: Security Architect Enterprise Security
site_author: Francois Hade
# Repository
repo_name: Security Architect-enterprise-security
repo_url: https://gitlab-ncsa.ubisoft.org/Security Architect-enterprise-architects/Security Architect-public-cloud-architect

# Copyright
copyright: Copyright &copy; Ubisoft Security Architect Enterprise Security Team - 2024

# Configuration
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.sections
  icon:
    repo: fontawesome/brands/gitlab
  palette: 
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

# Customization
extra:
  social:
    - icon: fontawesome/brands/gitlab
      link: https://gitlab-ncsa.ubisoft.org/Security Architect-enterprise-architects/Security Architect-public-cloud-architect

# Extensions
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true



extra_javascript:
  - fix-trailing-slash.js

# Plugins
plugins:
  - search
  - awesome-pages
  - git-revision-date-localized:
      type: date
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
          remove_comments: true
